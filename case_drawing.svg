<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="750" viewBox="0 0 900 750">
  <style>
    text { font-family: Arial, sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #222; }
    .subtitle { font-size: 12px; fill: #555; }
    .label { font-size: 11px; fill: #333; }
    .dim { stroke: #999; stroke-width: 0.8; stroke-dasharray: 6,4; }
    .dim-text { font-size: 10px; fill: #666; }
    .cut { stroke: #000; stroke-width: 2.5; fill: #fafafa; }
    .hole { stroke: #d00; stroke-width: 2; fill: #fee; }
    .inner { stroke: #888; stroke-width: 1; fill: none; stroke-dasharray: 4,3; }
    .note { font-size: 10px; fill: #888; }
  </style>
  
  <!-- Фон -->
  <rect width="900" height="750" fill="white"/>
  
  <!-- Заголовок -->
  <text x="450" y="30" text-anchor="middle" class="title">PULMOSCAN v1.0 — Чертёж корпуса</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">
    Размеры: 120×35×25 мм | Стенка: 2 мм | Масштаб: 1:3
  </text>
  
  <!-- ===== ВИД СВЕРХУ (крышка) ===== -->
  <text x="200" y="90" text-anchor="middle" class="title">ВИД СВЕРХУ (крышка)</text>
  
  <!-- Внешний контур -->
  <rect x="50" y="110" width="360" height="105" rx="3" class="cut"/>
  
  <!-- Внутренняя полость (стенки) -->
  <rect x="56" y="116" width="348" height="93" rx="2" class="inner"/>
  
  <!-- Отверстие микрофона (по центру) -->
  <circle cx="230" cy="162" r="15" class="hole"/>
  <text x="230" y="191" text-anchor="middle" class="label">Микрофон</text>
  <text x="230" y="202" text-anchor="middle" class="dim-text">∅10 мм</text>
  
  <!-- Размерная линия (длина) -->
  <line x1="50" y1="230" x2="410" y2="230" class="dim"/>
  <line x1="50" y1="225" x2="50" y2="235" class="dim"/>
  <line x1="410" y1="225" x2="410" y2="235" class="dim"/>
  <text x="230" y="245" text-anchor="middle" class="dim-text">120 мм</text>
  
  <!-- Размерная линия (ширина) -->
  <line x1="35" y1="110" x2="35" y2="215" class="dim"/>
  <line x1="30" y1="110" x2="40" y2="110" class="dim"/>
  <line x1="30" y1="215" x2="40" y2="215" class="dim"/>
  <text x="25" y="162" text-anchor="middle" class="dim-text" transform="rotate(-90,25,162)">35 мм</text>
  
  
  <!-- ===== ВИД СБОКУ (длинная сторона) ===== -->
  <text x="650" y="90" text-anchor="middle" class="title">ВИД СБОКУ</text>
  
  <!-- Внешний контур -->
  <rect x="500" y="110" width="360" height="75" rx="3" class="cut"/>
  
  <!-- Отверстие USB-C (слева) -->
  <rect x="498" y="141" width="29" height="12" class="hole"/>
  <text x="510" y="167" text-anchor="middle" class="label">USB-C</text>
  
  <!-- Отверстие кнопки (справа) -->
  <circle cx="845" cy="147" r="10" class="hole"/>
  <text x="845" y="171" text-anchor="middle" class="label">Кнопка</text>
  
  <!-- Отверстие светодиода (рядом с кнопкой) -->
  <circle cx="825" cy="140" r="7" class="hole"/>
  <text x="825" y="128" text-anchor="middle" class="dim-text">LED</text>
  
  
  <!-- ===== ВИД СПЕРЕДИ (головка щупа) ===== -->
  <text x="200" y="450" text-anchor="middle" class="title">ВИД СПЕРЕДИ (головка щупа с микрофоном)</text>
  
  <!-- Внешний контур -->
  <rect x="80" y="470" width="105" height="75" rx="3" class="cut"/>
  
  <!-- Отверстие микрофона (по центру) -->
  <circle cx="132" cy="507" r="15" class="hole"/>
  <text x="132" y="536" text-anchor="middle" class="label">Микрофон ∅10 мм</text>
  
  <!-- Размеры -->
  <line x1="80" y1="560" x2="185" y2="560" class="dim"/>
  <text x="132" y="575" text-anchor="middle" class="dim-text">35 мм</text>
  
  <line x1="200" y1="470" x2="200" y2="545" class="dim"/>
  <text x="210" y="507" text-anchor="middle" class="dim-text" transform="rotate(90,210,507)">25 мм</text>
  
  
  <!-- ===== ПРИМЕЧАНИЯ ===== -->
  <rect x="50" y="580" width="800" height="140" rx="5" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="605" text-anchor="middle" class="title">Спецификация и примечания</text>
  
  <text x="70" y="630" class="label">📐 Материал: PLA / ABS пластик (3D-печать) или ПВХ-трубка 32 мм</text>
  <text x="70" y="650" class="label">🔧 Сборка: 4 винта M2×6 мм по углам + клей для герметизации</text>
  <text x="70" y="670" class="label">🎤 Микрофон: INMP441 (I2S MEMS), установлен заподлицо с поверхностью</text>
  <text x="70" y="690" class="label">🔌 Питание: Li-Po 500 мАч + TP4056, зарядка через USB-C</text>
  <text x="70" y="710" class="label">📡 Связь: Bluetooth BLE + WiFi (ESP32-S3)</text>
  
  <text x="450" y="740" text-anchor="middle" class="note">PulmoScan v1.0 © 2026 | Сгенерировано Python (Pydroid 3) | Масштаб 1:3</text>
</svg>